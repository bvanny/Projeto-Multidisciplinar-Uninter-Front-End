<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaPlus - Agenda</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/modules.css">
</head>
<body class="dashboard-body">
    <button class="menu-toggle" id="menuToggle">☰</button>

    <aside class="sidebar" id="sidebar">
        <h2>Vida<span>Plus</span></h2>
        <nav>
            <ul>
                <li><a href="dashboard.html">Painel Principal</a></li>
                <li><a href="schedule.html" class="active">Agenda Médica</a></li>
                <li><a href="patients.html">Pacientes</a></li>
                <li><a href="records.html">Prontuários</a></li>
                <li><a href="telemedicine.html">Telemedicina</a></li>
                <li><a href="settings.html">Configurações</a></li>
                <li><a href="admin.html">Administração</a></li>
            </ul>
        </nav>
        <div class="user-info">
            <p>Olá, <strong id="userName">...</strong></p>
            <button id="btnLogout" class="btn-logout">Sair</button>
        </div>
    </aside>

    <main class="content">
        <header class="content-header">
            <div>
                <h1>Agenda Médica</h1>
                <p id="currentDateDisplay" class="text-muted mt-1" style="font-size:0.9rem"></p>
            </div>
            <div class="flex gap-10 lay">
                <input type="text" id="searchSchedule" class="search-input w-auto" placeholder="Buscar paciente..." style="width:250px">
                <input type="date" id="datePicker" class="search-input w-auto" style="padding:8px">
            </div>
        </header>

        <section class="card p-0" style="overflow:hidden">
            <table>
                <thead>
                    <tr>
                        <th style="padding:15px">Horário</th>
                        <th>Paciente</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="scheduleList"></tbody>
            </table>
        </section>
    </main>
    <script type="module" src="js/schedule.js"></script>
    <script type="module" src="js/toggle.js"></script>
</body>
</html>
