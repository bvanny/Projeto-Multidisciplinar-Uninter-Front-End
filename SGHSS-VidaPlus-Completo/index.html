<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidaPlus - Acesso Professional</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <main class="login-wrapper">
        <section class="card login-card">
            <h1 class="logo text-center">Vida<span>Plus</span></h1>
            <p id="authTitle" class="auth-title">Acesso Profissional</p>

            <form id="loginForm">
                <div class="input-field">
                    <label>E-mail Corporativo</label>
                    <input type="email" id="loginEmail" placeholder="admin@admin" required>
                </div>
                <div class="input-field">
                    <label>Senha</label>
                    <input type="password" id="loginPass" placeholder="admin@admin" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
                <p class="toggle-text"><a href="#" id="showReset">Esqueci minha senha</a></p>
                <p class="toggle-text">Novo profissional? <a href="#" id="showRegister">Cadastre-se com Token</a></p>
            </form>

            <form id="resetPassForm" class="hidden">
                <div class="info-banner">Informe seu e-mail e o Token para definir uma nova senha.</div>
                <div class="input-field">
                    <label>E-mail Cadastrado</label>
                    <input type="email" id="resetEmail" required>
                </div>
                <div class="input-field">
                    <label>Token de Validação</label>
                    <input type="text" id="resetToken" placeholder="VIDAPLUS-2026" required>
                </div>
                <div class="input-field">
                    <label>Nova Senha</label>
                    <input type="password" id="newPass" required>
                </div>
                <button type="submit" class="btn-primary">Alterar Senha</button>
                <p class="toggle-text"><a href="#" id="backToLoginReset">Voltar ao Login</a></p>
            </form>

            <form id="twoFactorForm" class="hidden">
                <p class="text-center mb-1">Autenticação de Dois Fatores (MFA)</p>
                <div class="mfa-container">
                    <small>Código Atual (Simulação):</small>
                    <strong id="display2FACode" class="mfa-code">------</strong>
                </div>
                <div class="input-field relative">
                    <input type="password" id="twoFactorCode" class="input-code" placeholder="000000" maxlength="6" required>
                    <button type="button" id="toggle2FAView" class="btn-toggle-view">👁️</button>
                </div>
                <div class="timer-container">
                    <div id="timerBar" class="timer-bar"></div>
                    <small id="timerText" class="text-muted">O código muda em: 02:00</small>
                </div>
                <button type="submit" class="btn-primary">Verificar e Acessar</button>
            </form>

            <form id="registerForm" class="hidden">
                <div class="input-field">
                    <label>Token de Ativação: (VIDAPLUS-2026)</label>
                    <input type="text" id="regToken" placeholder="VIDAPLUS-2026" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="input-field">
                        <label>Nome Completo</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="input-field">
                        <label>CRM / Registro</label>
                        <input type="text" id="regCRM" required>
                    </div>
                </div>
                <div class="input-field">
                    <label>Especialidade</label>
                    <input type="text" id="regSpec" required>
                </div>
                <div class="input-field">
                    <label>E-mail Corporativo</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="input-field">
                        <label>Senha</label>
                        <input type="password" id="regPass" required>
                    </div>
                    <div class="input-field">
                        <label>Confirmar Senha</label>
                        <input type="password" id="regPassConfirm" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Criar Conta</button>
                <p class="toggle-text">Já possui acesso? <a href="#" id="showLogin">Voltar ao Login</a></p>
            </form>
            <p id="authMessage" class="hidden"></p>
        </section>
    </main>
    <script type="module" src="js/scripts.js"></script>
    <script type="module" src="js/toggle.js"></script>

</body>
</html>
